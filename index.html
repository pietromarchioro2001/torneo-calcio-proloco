<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="description" content="Admin Panel - Torneo dei Paesi Sarnonico">
  <meta name="theme-color" content="#7a1e2c">

  <!-- ✅ RIATTIVATO: Link al manifest -->
  <link rel="manifest" href="manifest.json">
  
  <!-- ✅ CORRETTO: Meta tag per iOS -->
  <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/1AoeQcE1ZRxK5jDU8mWUzAR42h-A2PNZU">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Torneo">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1AoeQcE1ZRxK5jDU8mWUzAR42h-A2PNZU">
  
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="preload" as="image" href="https://lh3.googleusercontent.com/d/1AoeQcE1ZRxK5jDU8mWUzAR42h-A2PNZU">
  <title>Torneo Admin ⚽</title>
</head>
<body>

  <div id="startupLoader">
    <img src="https://lh3.googleusercontent.com/d/1AoeQcE1ZRxK5jDU8mWUzAR42h-A2PNZU" 
         alt="Logo Torneo" 
         class="startup-logo">
    <div class="startup-spinner"></div>
  </div>

  <style>
  #startupLoader {
    position: fixed;
    inset: 0;
    background: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999999;
    transition: opacity 0.3s ease;
  }

  .startup-logo {
    width: min(400px, 70vw);
    height: auto;
    object-fit: contain;
    margin-bottom: 30px;
    animation: logoFadeIn 0.3s ease;
  }

  @keyframes logoFadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }

  .startup-spinner {
    width: 50px;
    height: 50px;
    border: 4px solid #f3f3f3;
    border-top: 4px solid #7a1e2c;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 20px;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .startup-text {
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    letter-spacing: 5px;
    color: #7a1e2c;
    font-weight: 600;
  }

  #startupLoader.hide {
    opacity: 0;
    pointer-events: none;
  }
  </style>
  
  <div id="app"></div>
  <div id="toolbar"></div>

  <!-- ✅ RIATTIVATO: Registrazione Service Worker -->
  <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js')
        .then(reg => console.log('✅ Service Worker registrato:', reg.scope))
        .catch(err => console.error('❌ Errore registrazione SW:', err));
    });
  }
  </script>
  
  <script src="app.js"></script>

</body>
</html>
