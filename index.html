<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="description" content="Admin Panel - Torneo dei Paesi Sarnonico">
  <meta name="theme-color" content="#7a1e2c">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Torneo Admin ⚽</title>
</head>
<body>

  <div id="startupLoader">
  <!-- Sfondo con logo integrato -->
  <div class="startup-bg"></div>
  
  <!-- Overlay scuro trasparente -->
  <div class="startup-overlay"></div>
  
  <!-- Contenuto -->
  <div class="startup-content">
    <div class="startup-spinner-full"></div>
    <div class="startup-text-full">CARICAMENTO...</div>
  </div>
</div>

<style>
#startupLoader {
  position: fixed;
  inset: 0;
  z-index: 999999;
  transition: opacity 0.5s ease;
  background: #1a1a1a; /* Fallback */
}

.startup-bg {
  position: absolute;
  inset: 0;
  background: url('https://lh3.googleusercontent.com/d/1HVh1Suod5EmXv87lTRdXwk_ezqTGFlB7') center/cover no-repeat;
  opacity: 0.3; /* Logo integrato ma non dominante */
  animation: bgFadeIn 1s ease;
}

@keyframes bgFadeIn {
  from { opacity: 0; }
  to { opacity: 0.3; }
}

.startup-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(122,30,44,0.9) 0%, rgba(0,0,0,0.8) 100%);
}

.startup-content {
  position: relative;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.startup-spinner-full {
  width: 70px;
  height: 70px;
  border: 6px solid rgba(255, 255, 255, 0.2);
  border-top: 6px solid #ffffff;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 30px;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.startup-text-full {
  font-family: 'Oswald', sans-serif;
  font-size: 18px;
  letter-spacing: 6px;
  color: #ffffff;
  font-weight: 700;
  animation: pulse 1.5s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(0.98); }
}

#startupLoader.hide {
  opacity: 0;
  pointer-events: none;
}
</style>
  
  <div id="app"></div>
  <div id="toolbar"></div>

  <script src="app.js"></script>

</body>
</html>
