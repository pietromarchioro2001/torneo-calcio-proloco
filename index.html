<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="description" content="Admin Panel - Torneo dei Paesi Sarnonico">
  <meta name="theme-color" content="#7a1e2c">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Torneo Admin ⚽</title>
</head>
<body>
  
  <div id="startupLoader">
    <svg class="startup-logo" viewBox="0 0 200 200">
      <circle cx="100" cy="100" r="80" fill="none" stroke="#7a1e2c" stroke-width="8"/>
      <path d="M60 100 L90 130 L140 70" fill="none" stroke="#7a1e2c" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="startup-text">CARICAMENTO</div>
  </div>
  
  <div id="app"></div>
  <div id="toolbar"></div>

  <script src="app.js"></script>
  
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('✅ SW registered:', reg.scope))
          .catch(err => console.warn('⚠️ SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
