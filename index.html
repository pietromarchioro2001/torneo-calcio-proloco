<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="description" content="Admin Panel - Torneo dei Paesi Sarnonico">
  <meta name="theme-color" content="#7a1e2c">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Torneo Admin ⚽</title>
</head>
<body>
  
  <div id="startupLoader">
  <!-- Logo (sostituisci src con il tuo logo) -->
  <img src="https://lh3.googleusercontent.com/d/1HVh1Suod5EmXv87lTRdXwk_ezqTGFlB7-"
       alt="Logo Torneo" 
       class="startup-logo">

  <!-- Spinner rotante -->
  <div class="startup-spinner"></div>

</div>

<style>
#startupLoader {
  position: fixed;
  inset: 0;
  background: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999999;
  transition: opacity 0.5s ease;
}

.startup-logo {
  width: min(400px, 80vw);  /* Massimo 400px o 80% viewport */
  height: auto;
  object-fit: contain;
  margin-bottom: 40px;
  animation: logoFadeIn 0.5s ease;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15));
}

@keyframes logoFadeIn {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}

.startup-spinner {
  width: 60px;
  height: 60px;
  border: 5px solid #f3f3f3;
  border-top: 5px solid #7a1e2c;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 25px;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.startup-text {
  font-family: 'Oswald', sans-serif;
  font-size: 16px;
  letter-spacing: 5px;
  color: #7a1e2c;
  font-weight: 600;
  animation: pulse 1.5s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

#startupLoader.hide {
  opacity: 0;
  pointer-events: none;
}
</style>
  
  <div id="app"></div>
  <div id="toolbar"></div>

  <script src="app.js"></script>

</body>
</html>
